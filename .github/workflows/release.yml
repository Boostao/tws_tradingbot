name: Release TWS TraderBot Go

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    if: github.event_name == 'pull_request'
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Go Tests
        run: |
          go mod tidy
          go test -v ./...

  tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Create Tag
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
      - name: Check and create tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          if git ls-remote --tags origin | grep -q "refs/tags/$VERSION"; then
            echo "Tag $VERSION already exists."
          else
            echo "Creating tag $VERSION..."
            git tag $VERSION
            git push origin $VERSION
          fi

  build:
    needs: tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build App (Linux)
        if: runner.os == 'Linux'
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          CC=gcc wails build -tags webkit2_41 -platform linux/amd64
          mv build/bin/tws_traderbot build/bin/tws_traderbot-linux-amd64 || mv build/bin/tws_traderbot_go build/bin/tws_traderbot_go-linux-amd64 || true

      - name: Build App (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:Path += ";" + (go env GOPATH) + "\bin"
          wails build -platform windows/amd64
          Move-Item build/bin/*.exe build/bin/tws_traderbot-windows-amd64.exe

      - name: Build App (macOS)
        if: runner.os == 'macOS'
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          wails build -platform darwin/universal
          cd build/bin
          zip -r tws_traderbot-macos-universal.zip *.app

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          files: |
            build/bin/tws_traderbot*-linux-amd64
            build/bin/tws_traderbot*-windows-amd64.exe
            build/bin/tws_traderbot*-macos-universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
