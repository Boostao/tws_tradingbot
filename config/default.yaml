# Default configuration for the local TWS trader bot

# Interactive Brokers / TWS
ib:
  host: "127.0.0.1"
  port: 7497
  client_id: 1
  account: ""
  timeout: 5
  trading_mode: "paper"

# Runtime controls
runtime:
  fixed_notional: 10000.0
  bracket_enabled: false
  stop_loss_pct: 2.0
  take_profit_pct: 4.0

# Application Settings
app:
  log_level: "INFO"
  strategies_dir: "strategies"
  active_strategy_path: "config/active_strategy.json"
  watchlist_path: "config/watchlist.txt"
  symbol_cache_path: "data/symbol_cache.json"
  data_dir: "data"
  logs_dir: "logs"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file:
    enabled: true
    path: "logs/trading_bot.log"
    max_bytes: 10485760  # 10MB
    backup_count: 5
  console:
    enabled: true
    level: "INFO"

# Environment
environment: "development"  # or "production"