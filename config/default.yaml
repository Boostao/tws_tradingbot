# Default configuration for the PineScript-oriented app

# Application Settings
app:
  log_level: "INFO"
  strategies_dir: "strategies"
  active_strategy_path: "config/active_strategy.json"
  watchlist_path: "config/watchlist.txt"
  symbol_cache_path: "data/symbol_cache.json"
  data_dir: "data"
  logs_dir: "logs"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file:
    enabled: true
    path: "logs/trading_bot.log"
    max_bytes: 10485760  # 10MB
    backup_count: 5
  console:
    enabled: true
    level: "INFO"

# Environment
environment: "development"  # or "production"